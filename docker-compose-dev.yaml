# compose.yaml
name: task_manager-dev

services:
  # Backend server
  backend:
    volumes:
      - static:/static
      - 
    build:
      context: . # каталог сборки образа
      dockerfile: Dockerfile
    restart: always
    # эта команда нужна для prod, для разработки мы 
    # env_file:
    #   - .env
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "
      uv run python manage.py migrate &&
      uv run python manage.py collectstatic --noinput &&
      uv run gunicorn task_manager.wsgi:application --bind 0.0.0.0:8000
      "

  # PSQL - data base
  db:
    image: postgres:16
    restart: always
    shm_size: 256mb
    env_file:
      - .env
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5  
    

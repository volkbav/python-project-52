# compose.yaml
name: task_manager_dev

services:
  # Backend server
  backend:
    volumes:
      - static:/static
      - ./task_manager:/app/task_manager # монтируем только backend
      - ./pyproject.toml:/app/pyproject.toml
      - ./uv.lock:/app/uv.lock
      - ./tests:/app/tests
    build:
      context: . # каталог сборки образа
      dockerfile: Dockerfile
    restart: always
    ports:
    - '8000:8000'
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "
      uv run python manage.py migrate &&
      uv run python manage.py collectstatic --noinput &&
      uv run python manage.py runserver 0.0.0.0:8000
      "

  # PSQL - data base
  db:
    image: postgres:16.3
    restart: always
    shm_size: 128mb
    env_file:
      - .env
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5  
    
  adminer:  # для управления БД
    image: adminer
    restart: always
    ports:
      - 8080:8080

volumes:
  pgdata:
  static:

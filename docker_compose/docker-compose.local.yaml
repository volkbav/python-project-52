# compose.yaml
name: task_manager_dev

services:
  # Backend server
  backend:
    # смотри settings.STATIC_ROOT = "/static" - должно совпадать
    volumes:
      - static:/static
    image: volkbav/task_manager
    restart: always
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "
      uv run python manage.py migrate &&
      uv run python manage.py collectstatic --noinput &&
      uv run gunicorn --workers=4 --bind 0.0.0.0:8000 task_manager.wsgi:application
      "
    # запрещаем добавлять привилегии пользователям
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s


  # PSQL - data base
  db:
    image: postgres:16.3
    restart: always
    shm_size: 128mb
    env_file:
      - .env
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5  
    
  adminer:  # для управления БД
    image: adminer
    restart: always
    ports:
      - 8080:8080

volumes:
  pgdata:
  static:

# docker-compose.prod.yaml
name: task_manager_prod

services:
  # NGINX SERVER
  nginx:
    build: ./nginx
    restart: always
    ports:
      - '80:80'
      - '443:443'
    volumes:
      # сертификаты
      - certbot_www:/var/www/certbot
      - certbot_etc:/etc/letsencrypt
      # статика от бэкeнд
      - static:/static
    depends_on:
      backend:
        condition: service_healthy

  # Backend server
  backend:
    # смотри settings.STATIC_ROOT = "/static" - должно совпадать
    volumes:
      - static:/static
    build:
      context: . # каталог сборки образа
      dockerfile: Dockerfile
    restart: always
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "
      uv run python manage.py migrate &&
      uv run python manage.py collectstatic --noinput &&
      uv run gunicorn --workers=4 --bind 0.0.0.0:8000 task_manager.wsgi:application
      "
    # запрещаем добавлять привилегии пользователям
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # PSQL - data base
  db:
    image: postgres:16.3
    restart: always
    shm_size: 128mb
    env_file:
      - .env
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5  

  # CERTBOT
  certbot:
    image: certbot/certbot
    restart: "no"
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_etc:/etc/letsencrypt
    command: certonly \
      --webroot \
      --webroot-path=/var/www/certbot \
      --email example@example.com \
      --agree-tos \
      --no-eff-email \
      -d example.com -d www.example.com


volumes:
  pgdata:
  static:
  certbot_www:
  certbot_etc:

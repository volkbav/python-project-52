# docker-compose.prod.yaml
name: task_manager_prod

services:
  # Backend server
  backend:
    # смотри settings.STATIC_ROOT = "/static" - должно совпадать
    volumes:
      - static:/static
    build:
      context: . # каталог сборки образа
      dockerfile: Dockerfile
    restart: always
    # порт нужно будет убрать, после подключения nginx
    ports:
    - '8000:8000'
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "
      uv run python manage.py migrate &&
      uv run python manage.py collectstatic --noinput &&
      uv run gunicorn --workers=4 --bind 0.0.0.0:8000 task_manager.wsgi:application
      "
    # запрещаем добавлять привилегии пользователям
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  # PSQL - data base
  db:
    image: postgres:16.3
    restart: always
    shm_size: 128mb
    env_file:
      - .env
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5  

volumes:
  pgdata:
  static:
